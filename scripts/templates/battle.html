<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .battle-card {
    width: 860px;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    background:
      radial-gradient(ellipse at 20% 15%, rgba(244,63,94,0.10) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 15%, rgba(59,130,246,0.10) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(251,191,36,0.06) 0%, transparent 40%),
      radial-gradient(ellipse at 50% 50%, #0e0a14 0%, #08050c 100%);
    font-family: system-ui, -apple-system, sans-serif;
    border: 2px solid #2a1a3e;
    box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
  }

  /* Scanlines */
  .battle-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    opacity: 0.025;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(200,180,255,0.15) 2px, rgba(200,180,255,0.15) 3px);
    pointer-events: none;
    z-index: 10;
  }

  /* ---- HEADER ---- */
  .battle-header {
    text-align: center;
    padding: 16px 20px 12px;
    position: relative;
    z-index: 2;
  }

  .battle-title {
    font-size: 22px;
    font-weight: 700;
    color: #f0e4ff;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'Crimson Text', 'Palatino Linotype', Palatino, Georgia, serif;
    text-shadow: 0 0 20px rgba(200,140,255,0.3);
  }

  .battle-subtitle {
    font-size: 10px;
    color: #6a5a8a;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ---- COMBATANTS ROW (full cards) ---- */
  .combatants {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 16px;
    gap: 0;
    position: relative;
    z-index: 2;
  }

  .combatant-card {
    flex: 0 1 auto;
  }

  .combatant-card img {
    display: block;
    height: 480px;
    width: auto;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  /* VS divider */
  .vs-column {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 10px;
    flex-shrink: 0;
    min-width: 54px;
  }

  .vs-text {
    font-size: 30px;
    font-weight: 700;
    color: #fbbf24;
    text-shadow: 0 0 15px rgba(251,191,36,0.4), 0 0 30px rgba(251,191,36,0.2);
    font-family: 'Crimson Text', Georgia, serif;
    letter-spacing: 3px;
  }

  .vs-line {
    width: 2px;
    flex: 1;
    min-height: 30px;
    background: linear-gradient(transparent, rgba(251,191,36,0.3), transparent);
  }

  /* ---- BATTLE SCENE ---- */
  .battle-scene {
    margin: 12px 16px;
    border-radius: 10px;
    overflow: hidden;
    border: 1.5px solid #2a1a3e;
    height: 360px;
    position: relative;
    z-index: 2;
    background: #0a0510;
  }

  .battle-scene img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.88;
    display: block;
  }

  .battle-scene-fade {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(transparent, rgba(8,5,12,0.95));
  }

  .battle-scene-label {
    position: absolute;
    bottom: 8px;
    left: 10px;
    right: 10px;
    font-size: 9px;
    color: #8a7aaa;
    font-style: italic;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    font-family: 'Crimson Text', Georgia, serif;
  }

  /* ---- NARRATIVE ---- */
  .narrative-section {
    padding: 8px 16px 4px;
    position: relative;
    z-index: 2;
  }

  .narrative-divider {
    border-top: 1px solid #1a1028;
    padding-top: 8px;
  }

  .turn-row {
    display: flex;
    align-items: stretch;
    margin-bottom: 5px;
    min-height: 32px;
  }

  .turn-col {
    flex: 1;
    display: flex;
    align-items: flex-start;
    padding: 3px 8px;
    border-radius: 5px;
    min-height: 28px;
  }

  .turn-col.active {
    background: rgba(255,255,255,0.03);
  }

  .turn-col.left {
    justify-content: flex-end;
    text-align: right;
  }

  .turn-col.left .turn-content {
    align-items: flex-end;
  }

  .turn-col.left .turn-desc {
    text-align: right;
  }

  .turn-col.right {
    justify-content: flex-start;
    text-align: left;
  }

  .turn-col.right .turn-content {
    align-items: flex-start;
  }

  .turn-col.right .turn-desc {
    text-align: left;
  }

  .turn-divider {
    width: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .turn-number {
    font-size: 8px;
    font-weight: 700;
    color: #3a2a5a;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1px solid #2a1a3e;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .turn-content {
    display: flex;
    flex-direction: column;
  }

  .turn-ability {
    font-size: 10px;
    font-weight: 700;
    color: #d4c4f0;
    line-height: 1.2;
  }

  .turn-desc {
    font-size: 8px;
    color: #6a5a8a;
    margin-top: 1px;
    line-height: 1.3;
  }

  /* Result badge when in the opponent's column (cross-target) */
  .turn-result {
    display: flex;
    align-items: center;
    height: 100%;
    padding-top: 2px;
  }

  .turn-col.left .turn-result {
    justify-content: flex-end;
  }

  .turn-col.right .turn-result {
    justify-content: flex-start;
  }

  /* Result badge inline after description (self-target) */
  .turn-inline-result {
    margin-top: 1px;
  }

  .turn-damage {
    font-size: 11px;
    font-weight: 700;
    color: #e24b4a;
    white-space: nowrap;
  }

  .turn-damage.heal {
    color: #4ade80;
  }

  .turn-damage.effect {
    color: #fbbf24;
    font-size: 9px;
  }

  /* ---- RESULT ---- */
  .result-section {
    margin: 4px 16px 0;
    padding: 10px 14px;
    border-radius: 10px;
    position: relative;
    z-index: 2;
    text-align: center;
    background:
      radial-gradient(ellipse at 50% 50%, var(--winner-glow, rgba(251,191,36,0.12)) 0%, transparent 60%),
      rgba(20,14,30,0.8);
    border: 1px solid rgba(251,191,36,0.2);
  }

  .result-label {
    font-size: 8px;
    color: #6a5a8a;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .result-winner {
    font-size: 18px;
    font-weight: 700;
    color: #fbbf24;
    text-transform: uppercase;
    font-family: 'Crimson Text', Georgia, serif;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(251,191,36,0.3);
  }

  .result-summary {
    font-size: 9.5px;
    color: #9a8aba;
    margin-top: 4px;
    font-style: italic;
    font-family: 'Crimson Text', Georgia, serif;
    line-height: 1.5;
  }

  .result-hp {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 6px;
  }

  .result-hp-item {
    font-size: 9px;
    color: #6a5a8a;
  }

  .result-hp-item .name {
    font-weight: 600;
    color: #8a7aaa;
  }

  .result-hp-item .hp {
    font-weight: 700;
  }

  .result-hp-item .hp.alive {
    color: #4ade80;
  }

  .result-hp-item .hp.dead {
    color: #e24b4a;
  }

  /* ---- FOOTER ---- */
  .battle-footer {
    padding: 6px 16px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 2;
  }

  .battle-footer-text {
    font-size: 7.5px;
    color: #2a1a3e;
    letter-spacing: 0.3px;
  }

  /* Bottom accent bar */
  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2.5px;
    background: linear-gradient(90deg,
      var(--c1-primary, #e24b4a),
      var(--c1-accent, #f5a623),
      #fbbf24,
      var(--c2-accent, #67e8f9),
      var(--c2-primary, #3b82f6)
    );
    z-index: 11;
  }
</style>
</head>
<body>
  <div class="battle-card" style="
    --c1-primary: {{C1_PRIMARY}};
    --c1-accent: {{C1_ACCENT}};
    --c2-primary: {{C2_PRIMARY}};
    --c2-accent: {{C2_ACCENT}};
  ">

    <!-- Header -->
    <div class="battle-header">
      <div class="battle-title">{{BATTLE_NAME}}</div>
      <div class="battle-subtitle">LLMONSTER RANCHER BATTLE</div>
    </div>

    <!-- Battle Scene Image -->
    <div class="battle-scene">
      <img src="{{BATTLE_IMAGE}}" alt="Battle Scene" />
      <div class="battle-scene-fade"></div>
      <span class="battle-scene-label">{{BATTLE_SCENE_CAPTION}}</span>
    </div>

    <!-- Combatants (full cards) -->
    <div class="combatants">
      <div class="combatant-card">
        <img src="{{C1_CARD}}" alt="{{C1_NAME}}" />
      </div>

      <div class="vs-column">
        <div class="vs-line"></div>
        <div class="vs-text">VS</div>
        <div class="vs-line"></div>
      </div>

      <div class="combatant-card">
        <img src="{{C2_CARD}}" alt="{{C2_NAME}}" />
      </div>
    </div>

    <!-- Narrative -->
    <div class="narrative-section">
      <div class="narrative-divider">
{{TURNS_HTML}}
      </div>
    </div>

    <!-- Result -->
    <div class="result-section" style="--winner-glow: {{WINNER_GLOW}};">
      <div class="result-label">VICTOR</div>
      <div class="result-winner">{{WINNER_NAME}}</div>
      <div class="result-summary">{{RESULT_SUMMARY}}</div>
      <div class="result-hp">
        <div class="result-hp-item">
          <span class="name">{{C1_NAME}}</span>
          <span class="hp {{C1_FINAL_HP_CLASS}}">{{C1_FINAL_HP}} HP</span>
        </div>
        <div class="result-hp-item">
          <span class="name">{{C2_NAME}}</span>
          <span class="hp {{C2_FINAL_HP_CLASS}}">{{C2_FINAL_HP}} HP</span>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="battle-footer">
      <span class="battle-footer-text">LLMonster Rancher &bull; Battle Record</span>
      <span class="battle-footer-text">{{BATTLE_DATE}}</span>
    </div>

    <div class="bottom-bar"></div>
  </div>
</body>
</html>
